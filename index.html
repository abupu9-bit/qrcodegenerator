<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Downloader – Download TikTok, YouTube & Facebook Videos</title>

<meta name="description" content="Free online video downloader. Download videos from TikTok, YouTube and Facebook instantly. Just paste the link and download.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family: 'Inter', sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;

}

.container{

max-width:700px;
width:100%;
background:#020617;
padding:40px;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
text-align:center;

}

h1{

font-size:32px;
margin-bottom:10px;

}

p{

color:#cbd5f5;
margin-bottom:30px;

}

.input-box{

display:flex;
gap:10px;
margin-bottom:20px;

}

input{

flex:1;
padding:15px;
border-radius:10px;
border:none;
font-size:16px;

}

button{

padding:15px 25px;
border:none;
border-radius:10px;
background:#f59e0b;
font-weight:bold;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#fbbf24;

}

.result{

margin-top:30px;

}

.download-btn{

margin-top:15px;
display:inline-block;
padding:12px 20px;
background:#22c55e;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;

}

.platforms{

margin-top:25px;
font-size:14px;
color:#94a3b8;

}

footer{

margin-top:40px;
font-size:13px;
color:#64748b;

}

</style>

</head>

<body>

<div class="container">

<h1>Video Downloader</h1>

<p>Download videos from TikTok, YouTube and Facebook. Paste your link below.</p>

<div class="input-box">

<input id="videoURL" placeholder="Paste video link here">

<button onclick="downloadVideo()">Download</button>

</div>

<div class="result" id="result"></div>

<div class="platforms">
Supported platforms: TikTok • YouTube • Facebook
</div>

<footer>
Free Online Tool
</footer>

</div>

<script>

function downloadVideo(){

let url=document.getElementById("videoURL").value;

if(url==""){

document.getElementById("result").innerHTML=
"<p>Please paste a video link.</p>";

return;

}

let api="https://api.example.com/download?url="+encodeURIComponent(url);

document.getElementById("result").innerHTML=
"<p>Processing video...</p>";

fetch(api)

.then(res=>res.json())

.then(data=>{

document.getElementById("result").innerHTML=

`<p>Video Ready</p>
<a class="download-btn" href="${data.download}" target="_blank">Download Video</a>`;

})

.catch(()=>{

document.getElementById("result").innerHTML=
"<p>Unable to process video.</p>";

});

}

</script>

</body>
</html>
