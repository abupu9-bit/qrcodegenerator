<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code Generator – Create QR Codes Instantly</title>

<meta name="description" content="Free QR Code Generator. Create QR codes instantly for links, text, or contact information and download them easily.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;

}

.container{

max-width:600px;
width:100%;
background:#020617;
padding:40px;
border-radius:16px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.5);

}

h1{
font-size:30px;
margin-bottom:10px;
}

p{
color:#94a3b8;
margin-bottom:25px;
}

input{

width:100%;
padding:15px;
border-radius:10px;
border:none;
font-size:16px;

}

button{

margin-top:15px;
padding:15px 25px;
border:none;
border-radius:10px;
background:#f59e0b;
font-weight:600;
cursor:pointer;

}

button:hover{
background:#fbbf24;
}

.qr{

margin-top:25px;

}

.download{

margin-top:15px;
background:#22c55e;

}

footer{

margin-top:25px;
font-size:13px;
color:#64748b;

}

</style>

</head>

<body>

<div class="container">

<h1>QR Code Generator</h1>

<p>Create QR codes for links, text or anything instantly.</p>

<input id="text" placeholder="Enter URL or text">

<button onclick="generateQR()">Generate QR Code</button>

<div class="qr" id="qr"></div>

<button class="download" onclick="downloadQR()">Download QR</button>

<footer>
Free QR Code Generator Tool
</footer>

</div>

<script>

function generateQR(){

let text=document.getElementById("text").value;

if(text===""){

alert("Enter text or URL");

return;

}

let qr="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+encodeURIComponent(text);

document.getElementById("qr").innerHTML="<img id='qrimg' src='"+qr+"'>";

}

function downloadQR(){

let img=document.getElementById("qrimg");

if(!img){

alert("Generate QR first");

return;

}

let link=document.createElement("a");

link.href=img.src;

link.download="qr-code.png";

link.click();

}

</script>

</body>
</html>
