<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Code Generator – Free Online QR Code Maker</title>

<meta name="description" content="Free QR Code Generator to create QR codes instantly. Enter text or a URL and download your QR code as PNG. Simple, fast, and mobile friendly.">

<link rel="canonical" href="https://qrcodemaker.web.id/">
<meta name="robots" content="index,follow">

<meta property="og:title" content="Free QR Code Generator">
<meta property="og:description" content="Create QR codes instantly and download them in seconds.">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Free QR Code Generator">
<meta name="twitter:description" content="Generate QR codes instantly online.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- MGID Loader -->
<script src="https://jsc.mgid.com/site/1084924.js" async></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
max-width:700px;
width:100%;
background:#020617;
padding:40px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
text-align:center;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
color:#94a3b8;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
border-radius:10px;
border:none;
font-size:16px;
margin-bottom:15px;
}

button{
padding:14px 24px;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
margin:5px;
}

.generate{
background:#f59e0b;
color:black;
}

.download{
background:#22c55e;
color:white;
}

.copy{
background:#3b82f6;
color:white;
}

#qrcode{
margin-top:25px;
}

.share{
margin-top:25px;
}

.share button{
padding:12px 20px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
margin:5px;
}

.fb{background:#1877f2;color:white;}
.x{background:#000;color:white;}
.ig{background:#e1306c;color:white;}

footer{
margin-top:30px;
font-size:13px;
color:#64748b;
}

</style>

</head>

<body>

<div class="container">

<h1>QR Code Generator</h1>

<!-- MGID TOP WIDGET -->
<div data-type="_mgwidget" data-widget-id="1973982"></div>

<p>Create QR codes instantly for links, text, or any information.</p>

<input id="text" placeholder="Enter URL or text">

<div>

<button class="generate" onclick="generateQR()">Generate QR</button>
<button class="download" onclick="downloadQR()">Download PNG</button>
<button class="copy" onclick="copyText()">Copy Text</button>

</div>

<div id="qrcode"></div>

<div class="share">

<p>Share this tool</p>

<button class="fb" onclick="shareFB()">Facebook</button>
<button class="x" onclick="shareX()">X.com</button>
<button class="ig" onclick="shareIG()">Instagram</button>

</div>

<!-- MGID BOTTOM WIDGET -->
<div style="margin-top:40px;">
<div data-type="_mgwidget" data-widget-id="1973981"></div>
</div>

<footer>
Free Online QR Code Generator Tool
</footer>

</div>

<script>

/* LOAD MGID WIDGET AFTER PAGE READY */

window.addEventListener("load",function(){

if(window._mgq){

window._mgq.push(["_mgc.load"]);

}

});

let qr;

function generateQR(){

let text=document.getElementById("text").value.trim();

if(!text){
alert("Enter text or URL");
return;
}

document.getElementById("qrcode").innerHTML="";

qr=new QRCode(document.getElementById("qrcode"),{
text:text,
width:250,
height:250
});

}

function downloadQR(){

let canvas=document.querySelector("#qrcode canvas");
let img=document.querySelector("#qrcode img");

if(canvas){

let link=document.createElement("a");
link.href=canvas.toDataURL("image/png");
link.download="qrcode.png";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

else if(img){

fetch(img.src)
.then(res=>res.blob())
.then(blob=>{
let url=URL.createObjectURL(blob);
let link=document.createElement("a");
link.href=url;
link.download="qrcode.png";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
URL.revokeObjectURL(url);
});

}

else{
alert("Generate QR first");
}

}

function copyText(){

let text=document.getElementById("text").value;

if(!text){
alert("Enter text first");
return;
}

if(navigator.clipboard){

navigator.clipboard.writeText(text).then(()=>{
alert("Copied!");
});

}else{

let temp=document.createElement("textarea");
temp.value=text;
document.body.appendChild(temp);
temp.select();
document.execCommand("copy");
document.body.removeChild(temp);
alert("Copied!");

}

}

function shareFB(){

let url=encodeURIComponent(window.location.href);
window.open("https://www.facebook.com/sharer/sharer.php?u="+url,"_blank");

}

function shareX(){

let url=encodeURIComponent(window.location.href);
let text=encodeURIComponent("Free QR Code Generator Tool");

window.open("https:/x.com/intent/tweet?text="+text+"&url="+url,"_blank");

}

function shareIG(){

navigator.clipboard.writeText(window.location.href);
alert("Link copied! Paste it in Instagram.");

}

</script>

</body>
</html>
