<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Free QR Code Generator Online – Create QR Codes Instantly</title>

<meta name="description" content="Generate QR codes instantly for URLs, text, contacts, WiFi and more. Free online QR code generator with download option.">

<meta name="robots" content="index,follow">

<link rel="canonical" href="https://example.com/qr-code-generator">

<!-- Open Graph -->
<meta property="og:title" content="Free QR Code Generator">
<meta property="og:description" content="Create QR codes instantly and download them in seconds.">
<meta property="og:type" content="website">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Free QR Code Generator">
<meta name="twitter:description" content="Generate QR codes instantly online.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;

}

.container{

max-width:700px;
width:100%;
background:#020617;
padding:40px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
text-align:center;

}

h1{

font-size:32px;
margin-bottom:10px;

}

p{

color:#94a3b8;
margin-bottom:25px;

}

input{

width:100%;
padding:16px;
border-radius:10px;
border:none;
font-size:16px;
margin-bottom:15px;

}

button{

padding:14px 24px;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
margin:5px;

}

.generate{

background:#f59e0b;
color:black;

}

.download{

background:#22c55e;
color:white;

}

.copy{

background:#3b82f6;
color:white;

}

#qrcode{

margin-top:25px;

}

footer{

margin-top:30px;
font-size:13px;
color:#64748b;

}

</style>

</head>

<body>

<div class="container">

<h1>QR Code Generator</h1>

<p>Create QR codes instantly for links, text, or any information.</p>

<input id="text" placeholder="Enter URL or text">

<div>

<button class="generate" onclick="generateQR()">Generate QR</button>

<button class="download" onclick="downloadQR()">Download PNG</button>

<button class="copy" onclick="copyText()">Copy Text</button>

</div>

<div id="qrcode"></div>

<footer>

Free Online QR Code Generator Tool

</footer>

</div>

<script>

let qr;

function generateQR(){

let text=document.getElementById("text").value;

if(!text){

alert("Enter text or URL");

return;

}

document.getElementById("qrcode").innerHTML="";

qr=new QRCode(document.getElementById("qrcode"),{

text:text,
width:250,
height:250

});

}

function downloadQR(){

let img=document.querySelector("#qrcode img");

if(!img){

alert("Generate QR first");

return;

}

let link=document.createElement("a");

link.href=img.src;

link.download="qrcode.png";

link.click();

}

function copyText(){

let text=document.getElementById("text").value;

navigator.clipboard.writeText(text);

alert("Copied!");

}

</script>

</body>
</html>
