<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Name Generator – Generate Random Names Instantly</title>

<meta name="description" content="Free random name generator. Generate random names instantly for games, usernames, characters, and more.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.container{

max-width:600px;
width:100%;
background:#020617;
padding:40px;
border-radius:16px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.5);

}

h1{
font-size:30px;
margin-bottom:10px;
}

p{
color:#94a3b8;
margin-bottom:25px;
}

.name{

font-size:28px;
font-weight:700;
margin:20px 0;
color:#fbbf24;

}

button{

padding:15px 25px;
border:none;
border-radius:10px;
background:#f59e0b;
font-weight:600;
cursor:pointer;

}

button:hover{
background:#fbbf24;
}

.copy{

margin-top:10px;
background:#22c55e;

}

footer{

margin-top:25px;
font-size:13px;
color:#64748b;

}

</style>

</head>

<body>

<div class="container">

<h1>Random Name Generator</h1>

<p>Generate random names for usernames, games, characters and more.</p>

<div class="name" id="name">Click Generate</div>

<button onclick="generateName()">Generate Name</button>

<br>

<button class="copy" onclick="copyName()">Copy Name</button>

<footer>
Free Online Name Generator
</footer>

</div>

<script>

const first=[

"Shadow","Storm","Iron","Dark","Silent","Red","Ghost","Night","Wolf","Fire",
"Steel","Thunder","Silver","Golden","Rapid","Blaze","Frost","Nova","Solar","Cyber"

];

const second=[

"Rider","Hunter","Warrior","Knight","Dragon","Falcon","Titan","Phantom","Blade","Striker",
"Sniper","Vortex","Storm","Raider","Legend","Ninja","Rogue","Samurai","Wizard","Champion"

];

function generateName(){

let f=first[Math.floor(Math.random()*first.length)];

let s=second[Math.floor(Math.random()*second.length)];

let name=f+s+Math.floor(Math.random()*100);

document.getElementById("name").innerText=name;

}

function copyName(){

let text=document.getElementById("name").innerText;

navigator.clipboard.writeText(text);

alert("Name copied!");

}

</script>

</body>
</html>
